<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoIni Test Reports</title>
    <style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #0a0a0f;
			background-image: radial-gradient(circle at 20% 30%, rgba(255, 0, 170, 0.08) 0%, transparent 50%),
				radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.05) 0%, transparent 50%);
			min-height: 100vh;
			padding: 40px 20px;
			color: #f0f0f0;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			position: relative;
			z-index: 2;
		}

		.header {
			text-align: center;
			margin-bottom: 48px;
		}

		.header h1 {
			font-size: 2.8rem;
			font-weight: 600;
			background: linear-gradient(135deg, #ffffff, #ff66cc);
			-webkit-background-clip: text;
		    background-clip: text;
		    color: transparent;
		    letter-spacing: -0.02em;
		    margin-bottom: 12px;
		    text-shadow: 0 0 20px rgba(255, 0, 170, 0.3);
		}

		.header p {
		    color: rgba(255, 255, 255, 0.7);
		    font-size: 1.1rem;
		    font-weight: 400;
		}

		.stats-grid {
		    display: grid;
		    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
		    gap: 24px;
		    margin-bottom: 48px;
		}

		.stat-card {
		    background: rgba(20, 20, 30, 0.45);
		    backdrop-filter: blur(12px);
		    border-radius: 28px;
		    padding: 28px 20px;
		    text-align: center;
		    border: 1px solid rgba(255, 0, 170, 0.25);
		    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
		    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
		}

		.stat-card:hover {
		    transform: translateY(-5px);
		    border-color: rgba(255, 0, 170, 0.7);
		    box-shadow: 0 15px 35px rgba(255, 0, 170, 0.2);
		    background: rgba(30, 30, 40, 0.55);
		}

		.stat-number {
		    font-size: 3.2rem;
		    font-weight: 700;
		    margin-bottom: 8px;
		    letter-spacing: -0.02em;
		}

		.stat-label {
		    color: rgba(255, 255, 255, 0.7);
		    font-size: 0.85rem;
		    text-transform: uppercase;
		    letter-spacing: 1.5px;
		    font-weight: 500;
		}

		.passed { color: #10b981; text-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
		.failed { color: #ef4444; text-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
		.total { color: #3b82f6; text-shadow: 0 0 8px rgba(59, 130, 246, 0.4); }
		.skipped { color: #f59e0b; text-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }

		.test-list {
		    background: rgba(20, 20, 30, 0.4);
		    backdrop-filter: blur(16px);
		    border-radius: 32px;
		    padding: 28px;
		    border: 1px solid rgba(255, 0, 170, 0.3);
		    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
		}

		.test-list h2 {
		    font-size: 1.6rem;
		    font-weight: 600;
		    margin-bottom: 24px;
		    color: #fff;
		    letter-spacing: -0.01em;
		    border-left: 4px solid #ff00aa;
		    padding-left: 16px;
		}

		.search-box {
		    width: 100%;
		    padding: 14px 18px;
		    margin-bottom: 28px;
		    background: rgba(10, 10, 15, 0.7);
		    border: 1px solid rgba(255, 0, 170, 0.4);
		    border-radius: 48px;
		    font-size: 0.95rem;
		    color: #fff;
		    transition: all 0.2s ease;
		    font-family: inherit;
		}

		.search-box:focus {
		    outline: none;
		    border-color: #ff00aa;
		    box-shadow: 0 0 0 3px rgba(255, 0, 170, 0.2);
		    background: rgba(10, 10, 15, 0.9);
		}

		.search-box::placeholder { color: rgba(255, 255, 255, 0.5); }

		.test-item {
		    display: flex;
		    align-items: center;
		    gap: 14px;
		    padding: 14px 16px;
		    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
		    transition: all 0.2s ease;
		    border-radius: 16px;
		}

		.test-item:hover {
		    background: rgba(255, 0, 170, 0.08);
		    transform: translateX(4px);
		}

		.test-status {
		    width: 28px;
		    height: 28px;
		    border-radius: 50%;
		    display: inline-flex;
		    align-items: center;
		    justify-content: center;
		    font-size: 14px;
		    font-weight: bold;
		    flex-shrink: 0;
		}

		.status-pass {
		    background: #10b981;
		    box-shadow: 0 0 6px #10b981;
		    color: white;
		}

		.status-fail {
		    background: #ef4444;
		    box-shadow: 0 0 6px #ef4444;
		    color: white;
		}

		.test-name {
		    flex: 1;
		    font-family: 'Fira Code', 'Courier New', monospace;
		    font-size: 0.9rem;
		    font-weight: 500;
		    color: rgba(255, 255, 255, 0.9);
		    word-break: break-word;
		}

		.test-duration {
		    color: rgba(255, 255, 255, 0.5);
		    font-size: 0.75rem;
		    font-family: monospace;
		    background: rgba(0, 0, 0, 0.3);
		    padding: 4px 8px;
		    border-radius: 20px;
		}

		.footer {
		    text-align: center;
		    margin-top: 48px;
		    padding: 20px;
		    color: rgba(255, 255, 255, 0.5);
		    font-size: 0.85rem;
		    border-top: 1px solid rgba(255, 0, 170, 0.2);
		}

		.badge {
		    display: inline-block;
		    padding: 4px 12px;
		    border-radius: 40px;
		    font-size: 0.7rem;
		    font-weight: 600;
		    text-transform: uppercase;
		    letter-spacing: 0.5px;
		}

		.badge-success {
		    background: rgba(16, 185, 129, 0.2);
		    border: 1px solid #10b981;
		    color: #10b981;
		}

		.badge-failure {
		    background: rgba(239, 68, 68, 0.2);
		    border: 1px solid #ef4444;
		    color: #ef4444;
		}

		.test-item:last-child { border-bottom: none; }

		@media (max-width: 768px) {
		    body { padding: 20px 12px; }

			.stats-grid { gap: 16px; }

		    .stat-card { padding: 20px 12px; }

		    .stat-number { font-size: 2.2rem; }

		    .test-list { padding: 20px; }

		    .test-item {
		        flex-wrap: wrap;
		        gap: 8px;
		    }

		    .test-name {
		        width: 100%;
		        order: 1;
		    }

		    .test-duration { order: 2; }

		    .test-status { order: 0; }
		}

		.header h1 { animation: titleGlow 3s ease-in-out infinite alternate; }

		@keyframes titleGlow {
		    0% { text-shadow: 0 0 10px rgba(255, 0, 170, 0.2); }

			100% { text-shadow: 0 0 25px rgba(255, 0, 170, 0.5); }
		}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 NeoIni Test Reports</h1>
            <p>Automated Test Reports</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number total">{{TOTAL}}</div>
                <div class="stat-label">Total Tests</div>
            </div>
            <div class="stat-card">
                <div class="stat-number passed">{{PASSED}}</div>
                <div class="stat-label">✅ Passed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number failed">{{FAILED}}</div>
                <div class="stat-label">❌ Failed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number skipped">{{SKIPPED}}</div>
                <div class="stat-label">⏭️ Skipped</div>
            </div>
        </div>

        <div class="test-list">
            <h2>📋 Detailed Test List</h2>
            <input type="text" class="search-box" id="search" placeholder="🔍 Search tests..." onkeyup="filterTests()">
            <div id="test-list-container">
                <!-- TEST_LIST -->
            </div>
        </div>
        <div class="footer">
            <p>🔄 Last updated: {{TIMESTAMP}}</p>
            <p>🔧 Automatically generated by GitHub Actions</p>
        </div>
    </div>
    <script>
        function filterTests() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const tests = document.querySelectorAll('.test-item');
            tests.forEach(test => {
                const name = test.getAttribute('data-name');
                if (name.includes(searchTerm)) test.style.display = 'flex';
                else test.style.display = 'none';
            });
        }
    </script>
</body>
</html>
