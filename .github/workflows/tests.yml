name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Run tests and generate report
        run: |
          dotnet test NeoIni.Tests/NeoIni.Tests.csproj \
            --configuration Release \
            --logger "trx" \
            --results-directory ./TestResults

          mkdir -p test-reports

          trx_file=$(find ./TestResults -name "*.trx" | head -1)

          if [ -f "$trx_file" ]; then
            total=$(grep -o 'total="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*')
            passed=$(grep -o 'passed="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*')
            failed=$(grep -o 'failed="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*')
            skipped=$(grep -o 'skipped="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*')
            duration=$(grep -o 'duration="[0-9\.]*"' "$trx_file" | head -1 | grep -o '[0-9\.]*')

            percent=$((passed * 100 / total))
            if [ "$failed" -gt 0 ]; then
              status_text="❌ Failed tests exist"
            else
              status_text="✅ All tests passed"
            fi

            test_list_html=""
            while read -r test_name; do
              duration_line=$(grep -A 5 "testName=\"$test_name\"" "$trx_file" | grep -o 'duration="[0-9\.]*"' | head -1)
              test_duration=$(echo "$duration_line" | grep -o '[0-9\.]*')
              if [ -z "$test_duration" ]; then
                test_duration="< 1"
              fi
              test_list_html+="                <div class=\"test-item\" data-name=\"${test_name,,}\">\n"
              test_list_html+="                    <div class=\"test-status status-pass\">✓</div>\n"
              test_list_html+="                    <div class=\"test-name\">$test_name</div>\n"
              test_list_html+="                    <div class=\"test-duration\">${test_duration}ms</div>\n"
              test_list_html+="                </div>\n"
            done < <(grep -o 'testName="[^"]*"' "$trx_file" | sed 's/testName="//;s/"//')

            export TOTAL=$total
            export PASSED=$passed
            export FAILED=$failed
            export SKIPPED=$skipped
            export DURATION=$duration
            export PERCENT=$percent
            export STATUS_TEXT="$status_text"
            export TIMESTAMP="$(date '+%Y-%m-%d %H:%M:%S')"

            envsubst < .github/templates/report-template.html > test-reports/index.html

            tmp_file=$(mktemp)
            echo "$test_list_html" > "$tmp_file"
            sed -i "/<!-- TEST_LIST -->/r $tmp_file" test-reports/index.html
            sed -i "/<!-- TEST_LIST -->/d" test-reports/index.html
            rm "$tmp_file"

            cat > test-reports/README.md << EOF
# 📊 NeoIni Test Reports

## Latest Report: $(date '+%Y-%m-%d %H:%M:%S')

### Statistics
- ✅ Total Tests: $total
- ✅ Passed: $passed
- ❌ Failed: $failed
- ⏭️ Skipped: $skipped
- 📈 Pass Rate: $percent%
- ⏱️ Duration: ${duration}s

### 🎯 Status: **$status_text**

[📈 View Detailed HTML Report](index.html)

---

*Automatically generated by GitHub Actions*
EOF
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-reports
          publish_branch: gh-pages
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '📊 Update test reports - ${{ github.run_id }}'
