name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install gettext (for envsubst)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Run tests and generate report
        run: |
          set -e
          set -x

          dotnet test NeoIni.Tests/NeoIni.Tests.csproj \
            --configuration Release \
            --logger "trx" \
            --results-directory ./TestResults

          mkdir -p test-reports

          trx_file=$(find ./TestResults -name "*.trx" | head -1)

          if [ -f "$trx_file" ]; then
            total=$(grep -o 'total="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            passed=$(grep -o 'passed="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            failed=$(grep -o 'failed="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            skipped=$(grep -o 'skipped="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            duration=$(grep -o 'duration="[0-9\.]*"' "$trx_file" | head -1 | grep -o '[0-9\.]*' || echo "0")

            if [ "$total" -eq 0 ]; then
              percent=0
            else
              percent=$((passed * 100 / total))
            fi

            if [ "$failed" -gt 0 ]; then
              status_text="❌ Failed tests exist"
            else
              status_text="✅ All tests passed"
            fi

            test_list_html=""
            while IFS= read -r test_name; do
              duration_line=$(grep -A 5 "testName=\"$test_name\"" "$trx_file" | grep -o 'duration="[0-9\.]*"' | head -1 || true)
              test_duration=$(echo "$duration_line" | grep -o '[0-9\.]*' || echo "")
              if [ -z "$test_duration" ]; then
                test_duration="< 1"
              fi
              test_list_html+="                <div class=\"test-item\" data-name=\"${test_name,,}\">\n"
              test_list_html+="                    <div class=\"test-status status-pass\">✓</div>\n"
              test_list_html+="                    <div class=\"test-name\">$test_name</div>\n"
              test_list_html+="                    <div class=\"test-duration\">${test_duration}ms</div>\n"
              test_list_html+="                </div>\n"
            done < <(grep -o 'testName="[^"]*"' "$trx_file" | sed 's/testName="//;s/"//')

            export TOTAL=$total
            export PASSED=$passed
            export FAILED=$failed
            export SKIPPED=$skipped
            export DURATION=$duration
            export PERCENT=$percent
            export STATUS_TEXT="$status_text"
            export TIMESTAMP="$(date '+%Y-%m-%d %H:%M:%S')"

            if [ ! -f .github/templates/report-template.html ]; then
              echo "Error: Template .github/templates/report-template.html not found" >&2
              exit 1
            fi
            if [ ! -f .github/templates/test-report-readme.md ]; then
              echo "Error: Template .github/templates/test-report-readme.md not found" >&2
              exit 1
            fi

            echo "Generating HTML report..."
            envsubst < .github/templates/report-template.html > test-reports/index.html
            if [ $? -ne 0 ]; then
              echo "Error: envsubst failed for HTML template" >&2
              exit 1
            fi

            echo "Inserting test list..."
            tmp_file=$(mktemp)
            echo "$test_list_html" > "$tmp_file"
            sed -i "/<!-- TEST_LIST -->/r $tmp_file" test-reports/index.html
            if [ $? -ne 0 ]; then
              echo "Error: sed failed to insert test list" >&2
              rm -f "$tmp_file"
              exit 1
            fi
            sed -i "/<!-- TEST_LIST -->/d" test-reports/index.html
            rm "$tmp_file"

            echo "Generating README.md..."
            envsubst < .github/templates/test-report-readme.md > test-reports/README.md
            if [ $? -ne 0 ]; then
              echo "Error: envsubst failed for README template" >&2
              exit 1
            fi

            echo "Reports generated successfully"
          else
            echo "No TRX file found" >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-reports
          publish_branch: gh-pages
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '📊 Update test reports - ${{ github.run_id }}'
