name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install gettext (for envsubst)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Run tests and generate report
        run: |
          set -e
          set -x

          dotnet test NeoIni.Tests/NeoIni.Tests.csproj \
            --configuration Release \
            --logger "trx" \
            --results-directory ./TestResults

          mkdir -p test-reports

          trx_file=$(find ./TestResults -name "*.trx" | head -1)

          if [ -f "$trx_file" ]; then
            total=$(grep -o 'total="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            passed=$(grep -o 'passed="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            failed=$(grep -o 'failed="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            skipped=$(grep -o 'skipped="[0-9]*"' "$trx_file" | head -1 | grep -o '[0-9]*' || echo "0")
            duration=$(grep -o 'duration="[0-9\.]*"' "$trx_file" | head -1 | grep -o '[0-9\.]*' || echo "0")

            if [ "$total" -eq 0 ]; then
              percent=0
            else
              percent=$((passed * 100 / total))
            fi

            if [ "$failed" -gt 0 ]; then
              status_text="❌ Failed tests exist"
            else
              status_text="✅ All tests passed"
            fi

            test_list_html=""
            test_count=0
            while IFS= read -r line; do
                test_name=$(echo "$line" | sed -n 's/.*testName="\([^"]*\)".*/\1/p')
                outcome=$(echo "$line" | sed -n 's/.*outcome="\([^"]*\)".*/\1/p')
                duration_sec=$(echo "$line" | sed -n 's/.*duration="\([0-9.]*\)".*/\1/p')
                
                if [ -z "$test_name" ]; then
                    continue
                fi
                
                test_count=$((test_count + 1))
                
                if [ -z "$duration_sec" ]; then
                    duration_ms="&lt; 1"
                else
                    duration_ms=$(echo "$duration_sec * 1000" | bc | sed 's/\..*//')
                    if [ "$duration_ms" = "0" ]; then
                        duration_ms="&lt; 1"
                    fi
                fi
                
                if [ "$outcome" = "Passed" ]; then
                    status_class="status-pass"
                    status_symbol="✓"
                elif [ "$outcome" = "Failed" ]; then
                    status_class="status-fail"
                    status_symbol="✗"
                else
                    status_class="status-skipped"
                    status_symbol="⏭️"
                fi
                
                test_list_html+=$(printf '<div class="test-item" data-name="%s">' "$(echo "$test_name" | tr '[:upper:]' '[:lower:]')")
                test_list_html+=$(printf '<div class="test-status %s">%s</div>' "$status_class" "$status_symbol")
                test_list_html+=$(printf '<div class="test-name">%s</div>' "$test_name")
                test_list_html+=$(printf '<div class="test-duration">%sms</div>' "$duration_ms")
                test_list_html+='</div>'
            done < <(grep '<UnitTestResult' "$trx_file")

            echo "Found $test_count test cases in TRX file"

            export TOTAL=$total
            export PASSED=$passed
            export FAILED=$failed
            export SKIPPED=$skipped
            export DURATION=$duration
            export PERCENT=$percent
            export STATUS_TEXT="$status_text"
            export TIMESTAMP="$(date '+%Y-%m-%d %H:%M:%S')"

            if [ ! -f .github/templates/report-template.html ]; then
              echo "Error: Template .github/templates/report-template.html not found" >&2
              exit 1
            fi
            if [ ! -f .github/templates/test-report-readme.md ]; then
              echo "Error: Template .github/templates/test-report-readme.md not found" >&2
              exit 1
            fi

            echo "Generating HTML report..."
            sed -e "s/{{TOTAL}}/$total/g" \
                -e "s/{{PASSED}}/$passed/g" \
                -e "s/{{FAILED}}/$failed/g" \
                -e "s/{{SKIPPED}}/$skipped/g" \
                -e "s/{{TIMESTAMP}}/$(date '+%Y-%m-%d %H:%M:%S')/g" \
                .github/templates/report-template.html > test-reports/index.html.tmp

            tmp_file=$(mktemp)
            printf '%s\n' "$test_list_html" > "$tmp_file"
            awk -v insert="$tmp_file" '/<!-- TEST_LIST -->/ { system("cat " insert); next } 1' test-reports/index.html.tmp > test-reports/index.html
            rm "$tmp_file"
            rm test-reports/index.html.tmp

            echo "Generating README.md..."
            envsubst < .github/templates/test-report-readme.md > test-reports/README.md
            if [ $? -ne 0 ]; then
              echo "Error: envsubst failed for README template" >&2
              exit 1
            fi

            echo "Reports generated successfully"
          else
            echo "No TRX file found" >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-reports
          publish_branch: gh-pages
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '📊 Update test reports - ${{ github.run_id }}'
